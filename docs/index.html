{% comment %} 
   Split the file into an array at your specific heading.
   The [1] index takes everything AFTER that heading.
{% endcomment %}
{% assign parts = full_file | split: "## My Specific Section" %}

{% comment %} 
   Split again at the NEXT heading to stop the inclusion.
   The [0] index takes the text before the next '##'.
{% endcomment %}
{% assign section = parts[1] | split: "##" | first %}
